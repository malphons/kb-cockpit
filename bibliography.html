<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kb-cockpit — Bibliography</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  .rp-pdf .pdfhl-host { height:100%; min-height:0; }
  .pdfhl-root { overflow:auto; height:100%; background:#2b2b30; }
  .pdfhl-page { position:relative; margin:8px auto; background:#fff; box-shadow:0 1px 6px rgba(0,0,0,.4); }
  .pdfhl-page canvas { display:block; }
  .pdfhl-textlayer { position:absolute; inset:0; overflow:hidden; line-height:1; }
  .pdfhl-textlayer span { color:transparent; position:absolute; white-space:pre; transform-origin:0 0; }
  .pdfhl-textlayer ::selection { background:rgba(90,130,255,.35); }
  .pdfhl-hl-layer { position:absolute; inset:0; pointer-events:none; }
  .pdfhl-hl { position:absolute; background:rgba(255,212,0,.32); border-radius:2px; pointer-events:auto; cursor:pointer; mix-blend-mode:multiply; }
  .pdfhl-hl:hover { background:rgba(255,180,0,.55); }
  .pdfhl-loading { padding:18px; color:#bbb; }
  .hl-list { display:flex; flex-direction:column; gap:3px; }
  .hl-item { display:flex; gap:8px; align-items:baseline; padding:3px 6px; border-radius:6px; cursor:pointer; font-size:12.5px; }
  .hl-item:hover { background:rgba(255,255,255,.06); }
  .hl-tag { font-weight:600; font-family:ui-monospace,monospace; }
  .hl-pg { color:var(--muted,#9a96a8); font-size:11px; }
  .hl-q { color:var(--muted,#9a96a8); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hl-pop { position:fixed; z-index:9999; width:300px; background:#1c1c22; border:1px solid #3a3a44; border-radius:10px; padding:10px; box-shadow:0 6px 24px rgba(0,0,0,.5); }
  .hl-pop.hidden { display:none; }
  .hl-pop-row { display:flex; gap:8px; align-items:center; margin-bottom:6px; }
  .hl-pop-row input { flex:1; }
  .hl-pop-quote { font-size:12px; color:var(--muted,#9a96a8); max-height:54px; overflow:auto; border-left:2px solid #555; padding-left:7px; margin-bottom:6px; white-space:pre-wrap; }
  .hl-pop textarea { width:100%; min-height:60px; }
  .hl-pop-actions { display:flex; gap:8px; align-items:center; margin-top:7px; }
  .hl-pop .danger { color:#f5709a; }
</style>
</head>
<body>
<div id="app"><p class="spinner">Loading…</p></div>
<script src="config.js"></script>
<script src="assets/vendor/supabase.min.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/pdfhl.js"></script>
<script src="assets/app.js"></script>
<script>
let REFS = [], NOTES = {}, OBJECTS = [], filter = "", statusF = "", chapterF = "", notesOnly = false,
    tagFilter = new Set(), sortKey = "reading_priority", sortDir = -1, openKey = null,
    scopeF = "curated", archiveLoaded = false;
let HLS = [], pdfCtl = null, hlEditing = null;    // current paper's PDF highlights
const STATUS_LABEL = { Q: "queued", S: "skimmed", R: "read", N: "read+notes", C: "cited" };
// kb_library unifies the curated bibliography (kb_bib) and the arXiv archive (kb_archive).
// ref_id = citation_key for curated, arxiv_id for archive; bucket tells us where the PDF lives.
const LIB_COLS = "corpus,ref_id,bucket,pdf_object,title,authors,year,venue,status,chapter,doi,arxiv_id,raw_path,wiki_source_page,abstract,primary_category,tags,reading_priority";

const hasNote = k => !!(NOTES[k] && NOTES[k].trim());
const noteCount = () => Object.keys(NOTES).filter(hasNote).length;
const tagsOf = r => Array.isArray(r.tags) ? r.tags : [];
const refByKey = k => REFS.find(r => r.ref_id === k);
const isObj = t => t.startsWith("@");           // object/target tags are '@'-prefixed
const objName = t => t.replace(/^@/, "");
const scopedRefs = () => scopeF ? REFS.filter(r => r.corpus === scopeF) : REFS;

// deterministic per-tag color (themes); objects use a fixed style via .obj class
function hashHue(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) % 360; return h; }
function tagStyle(t) { const h = hashHue(t); return `background:hsl(${h} 38% 19%);border-color:hsl(${h} 45% 40%);color:hsl(${h} 70% 82%);`; }
function tagChip(t, opt = {}) {
  const obj = isObj(t);
  const label = obj ? "🪐 " + esc(objName(t)) : esc(t);
  const x = opt.removable ? ` <span class="x" data-rmtag="${esc(t)}" title="remove">×</span>` : "";
  const count = opt.count != null ? ` <span class="tn">${opt.count}</span>` : "";
  const style = obj ? "" : ` style="${tagStyle(t)}"`;
  return `<span class="tagchip${obj ? " obj" : ""}${opt.active ? " active" : ""}"${style} data-tag="${esc(t)}">${label}${count}${x}</span>`;
}
const priClass = p => (p ?? 0) >= 70 ? "pri-hi" : (p ?? 0) >= 40 ? "pri-md" : "pri-lo";
const prettyCat = c => (c || "—").replace(/^\d+_/, "").replace(/_/g, " ");
function allTags() {
  const m = new Map();
  scopedRefs().forEach(r => tagsOf(r).forEach(t => m.set(t, (m.get(t) || 0) + 1)));
  return [...m.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
}

function visible() {
  const q = filter.trim().toLowerCase();
  let rows = scopedRefs().filter(r => {
    if (notesOnly && !hasNote(r.ref_id)) return false;
    if (statusF && (r.status || "") !== statusF) return false;
    if (chapterF && (r.chapter || "") !== chapterF) return false;
    if (tagFilter.size && ![...tagFilter].every(t => tagsOf(r).includes(t))) return false;
    if (!q) return true;
    return [r.ref_id, r.title, r.authors, r.venue, tagsOf(r).map(objName).join(" ")]
      .some(v => (v || "").toString().toLowerCase().includes(q));
  });
  return rows.sort((a, b) => {
    let x = a[sortKey], y = b[sortKey];
    if (x == null) return 1; if (y == null) return -1;
    return (x > y ? 1 : x < y ? -1 : 0) * sortDir;
  });
}

function refLinks(r) {
  const out = [];
  if (r.doi) out.push(`<a href="https://doi.org/${esc(r.doi)}" target="_blank" rel="noopener">DOI</a>`);
  if (r.arxiv_id) out.push(`<a href="https://arxiv.org/abs/${esc(r.arxiv_id)}" target="_blank" rel="noopener">arXiv</a>`);
  if (r.wiki_source_page) out.push(`<a href="${repoUrl(r.wiki_source_page, "blob")}" target="_blank" rel="noopener">wiki page</a>`);
  if (r.raw_path) {
    const isUrl = /^https?:\/\//i.test(r.raw_path);
    const href = isUrl ? r.raw_path : repoUrl(r.raw_path, "blob");
    out.push(`<a href="${esc(href)}" target="_blank" rel="noopener">${isUrl ? "abstract ↗" : "source file ↗"}</a>`);
  }
  return out.join(" · ");
}

function renderTagBar() {
  const bar = document.getElementById("tagbar");
  if (!bar) return;
  const all = allTags();
  const objs = all.filter(([t]) => isObj(t)), themes = all.filter(([t]) => !isObj(t));
  const grp = (label, list) => list.length
    ? `<span class="tagbar-label">${label}</span> ${list.map(([t, n]) => tagChip(t, { count: n, active: tagFilter.has(t) })).join("")}` : "";
  const sep = objs.length && themes.length ? '<span class="tagbar-sep"></span>' : "";
  const clear = tagFilter.size ? ` <button class="link-btn" id="tag-clear">clear ${tagFilter.size}</button>` : "";
  bar.innerHTML = `${grp("Objects", objs)} ${sep} ${grp("Themes", themes)}${clear}`;
}

function render() {
  const rows = visible();
  const archiveScope = scopeF === "archive";
  const body = rows.map(r => {
    const note = hasNote(r.ref_id);
    const pdf = r.pdf_object ? '<span class="has-pdf-pill">PDF</span>' : "";
    const tg = tagsOf(r);
    const ordered = [...tg.filter(isObj), ...tg.filter(t => !isObj(t))];
    const chips = ordered.map(t => tagChip(t)).join("");
    const p = r.reading_priority;
    const col6 = r.corpus === "archive" ? esc(prettyCat(r.primary_category)) : esc(r.chapter || "—");
    return `<tr class="ref-row${note ? " has-note" : ""}" data-key="${esc(r.ref_id)}">
      <td class="num"><span class="pri ${priClass(p)}">${p == null ? "—" : p}</span></td>
      <td class="key">${esc(r.ref_id)}${note ? ' <span class="notemark" title="has notes">📝</span>' : ""}</td>
      <td><div class="ti">${esc(r.title || "")}${pdf}</div>${chips ? `<div class="cell-tags">${chips}</div>` : ""}</td>
      <td class="num">${fmt(r.year)}</td>
      <td>${r.status ? `<span class="badge s-${esc(r.status)}" title="${esc(STATUS_LABEL[r.status] || r.status)}">${esc(r.status)}</span>` : "—"}</td>
      <td>${col6}</td>
    </tr>`;
  }).join("") || `<tr><td colspan="6" class="muted">No references match.</td></tr>`;

  const arrows = k => sortKey === k ? (sortDir > 0 ? " ▲" : " ▼") : "";
  document.getElementById("bib").innerHTML = `
    <thead><tr>
      <th data-k="reading_priority">Pri${arrows("reading_priority")}</th>
      <th data-k="ref_id">Key${arrows("ref_id")}</th>
      <th data-k="title">Title${arrows("title")}</th>
      <th data-k="year">Year${arrows("year")}</th>
      <th data-k="status">Status${arrows("status")}</th>
      <th data-k="${archiveScope ? "primary_category" : "chapter"}">${archiveScope ? "Category" : "Chapter"}${arrows(archiveScope ? "primary_category" : "chapter")}</th>
    </tr></thead><tbody>${body}</tbody>`;
  const scoped = scopedRefs();
  document.getElementById("count").textContent = rows.length;
  document.getElementById("total").textContent = scoped.length;
  document.getElementById("pdfcount").textContent = scoped.filter(r => r.pdf_object).length;
  const nc = document.getElementById("notecount");
  if (nc) nc.textContent = `${noteCount()} with notes`;
  renderTagBar();
}

// ---- reading panel ----
async function openReader(key) {
  const r = refByKey(key);
  if (!r) return;
  openKey = key;
  const panel = document.getElementById("reader-panel");
  panel.querySelector(".rp-key").textContent = r.ref_id;
  panel.querySelector(".rp-title").textContent = (r.title || "").replace(/<[^>]+>/g, "");
  panel.querySelector(".rp-meta").innerHTML =
    `${esc(r.authors || "")}${r.year ? " (" + r.year + ")" : ""}${r.venue ? " — " + esc(r.venue) : ""}`;
  panel.querySelector(".rp-links").innerHTML = refLinks(r) || '<span class="muted">no links</span>';
  document.getElementById("rp-promote-row").style.display = r.corpus === "archive" ? "" : "none";
  document.getElementById("rp-pri").value = r.reading_priority ?? "";
  renderReaderMeta(r);
  const ta = panel.querySelector("#rp-note");
  ta.value = NOTES[key] || "";
  setRpStatus(NOTES[key] ? "loaded" : "", "");
  panel.classList.remove("hidden");

  HLS = []; pdfCtl = null;
  document.getElementById("rp-hl-field").style.display = r.pdf_object ? "" : "none";
  renderHlList();

  const pane = panel.querySelector(".rp-pdf");
  pane.innerHTML = '<div class="placeholder">Loading…</div>';
  if (r.pdf_object) {
    try {
      const { data, error } = await window.kbAuth.sb.storage.from(r.bucket || "kb-pdfs").createSignedUrl(r.pdf_object, 3600);
      if (error || !data?.signedUrl) throw new Error(error?.message || "no signed URL");
      if (openKey !== key) return;
      HLS = await kbFetch(`kb_highlights?ref_id=eq.${encodeURIComponent(r.ref_id)}&select=id,tag,page,rects,quote,body,color&order=page`) || [];
      pane.innerHTML = '<div class="pdfhl-host" id="pdfhost"></div>';
      pdfCtl = await PDFHL.open({
        container: document.getElementById("pdfhost"),
        url: data.signedUrl,
        highlights: HLS,
        onSelect: pending => openHlForm(r.ref_id, pending, null),
        onOpen: hl => openHlForm(r.ref_id, null, hl)
      });
      renderHlList();
    } catch (e) {
      pane.innerHTML = `<div class="placeholder"><div>Couldn't load PDF.<br><span class="muted">${esc(e.message)}</span></div></div>`;
    }
  } else if (r.abstract) {
    const isUrl = r.raw_path && /^https?:\/\//i.test(r.raw_path);
    const link = isUrl ? `<a href="${esc(r.raw_path)}" target="_blank" rel="noopener">Open on AGU ↗</a>` : "";
    pane.innerHTML = `<article class="rp-abstract">
      <h3>${esc((r.title || "").replace(/<[^>]+>/g, ""))}</h3>
      <div class="rp-abs-meta">${esc(r.authors || "")}${r.venue ? " · " + esc(r.venue) : ""}</div>
      <div class="rp-abs-body">${esc(r.abstract)}</div>
      <div class="rp-abs-foot"><span class="muted">Abstract text (proxy for the full paper).</span> ${link}</div>
    </article>`;
  } else if (r.raw_path && /^https?:\/\//i.test(r.raw_path)) {
    pane.innerHTML = `<div class="placeholder"><div>This reference is a conference / web abstract, not a hosted PDF.</div>
      <a class="btn" href="${esc(r.raw_path)}" target="_blank" rel="noopener">Open abstract ↗</a></div>`;
  } else {
    pane.innerHTML = `<div class="placeholder"><div>No PDF or abstract for this reference.</div></div>`;
  }
}

function renderReaderMeta(r) {
  const objs = tagsOf(r).filter(isObj), themes = tagsOf(r).filter(t => !isObj(t));
  document.getElementById("rp-objs").innerHTML = objs.map(t => tagChip(t, { removable: true })).join("") || '<span class="muted">none</span>';
  document.getElementById("rp-tags").innerHTML = themes.map(t => tagChip(t, { removable: true })).join("") || '<span class="muted">no tags</span>';
  document.getElementById("rp-obj-list").innerHTML = OBJECTS.map(o => `<option value="${esc(o)}">`).join("");
  document.getElementById("rp-tag-list").innerHTML =
    allTags().filter(([t]) => !isObj(t)).map(([t]) => `<option value="${esc(t)}">`).join("");
}

function closeReader() {
  openKey = null;
  pdfCtl = null; HLS = [];
  closeHlForm();
  document.getElementById("reader-panel").classList.add("hidden");
  document.querySelector(".rp-pdf").innerHTML = "";
}
function setRpStatus(text, cls) {
  const s = document.getElementById("rp-status");
  if (s) { s.className = "note-status " + (cls || ""); s.textContent = text; }
}

// ---- PDF highlights ----
function renderHlList() {
  const box = document.getElementById("rp-hl-list");
  if (!box) return;
  if (!HLS.length) { box.innerHTML = '<span class="muted">none yet</span>'; return; }
  box.innerHTML = HLS.slice().sort((a, b) => (a.page - b.page)).map(h => {
    const hue = hashHue(h.tag || h.id);
    return `<div class="hl-item" data-id="${esc(h.id)}">
      <span class="hl-tag" style="color:hsl(${hue} 70% 72%)">${esc(h.tag || "p." + h.page)}</span>
      <span class="hl-pg">p.${h.page}</span>
      <span class="hl-q">${esc((h.quote || h.body || "").slice(0, 70))}</span>
    </div>`;
  }).join("");
}

function hlPopover() {
  let p = document.getElementById("hl-pop");
  if (p) return p;
  p = document.createElement("div");
  p.id = "hl-pop";
  p.className = "hl-pop hidden";
  p.innerHTML = `
    <div class="hl-pop-row"><input id="hl-tag" placeholder="tag (e.g. eq-4, methods)" autocomplete="off"><span id="hl-pg" class="muted"></span></div>
    <div id="hl-quote" class="hl-pop-quote"></div>
    <textarea id="hl-body" placeholder="note for this passage…"></textarea>
    <div class="hl-pop-actions">
      <button class="primary" id="hl-save">Save</button>
      <button id="hl-del" class="danger" style="display:none">Delete</button>
      <button id="hl-cancel">Cancel</button>
      <span class="note-status" id="hl-status"></span>
    </div>`;
  document.body.appendChild(p);
  p.querySelector("#hl-save").addEventListener("click", saveHl);
  p.querySelector("#hl-del").addEventListener("click", deleteHl);
  p.querySelector("#hl-cancel").addEventListener("click", closeHlForm);
  return p;
}
function setHlStatus(t, c) { const s = document.getElementById("hl-status"); if (s) { s.className = "note-status " + (c || ""); s.textContent = t; } }
function closeHlForm() { const p = document.getElementById("hl-pop"); if (p) p.classList.add("hidden"); hlEditing = null; if (pdfCtl) pdfCtl.clearSelection(); }

function openHlForm(refId, pending, existing) {
  const pop = hlPopover();
  hlEditing = { refId, pending, existing };
  const page = existing ? existing.page : pending.page;
  pop.querySelector("#hl-tag").value = existing ? (existing.tag || "") : "";
  pop.querySelector("#hl-body").value = existing ? (existing.body || "") : "";
  pop.querySelector("#hl-quote").textContent = (existing ? existing.quote : pending.quote) || "";
  pop.querySelector("#hl-pg").textContent = "p." + page;
  pop.querySelector("#hl-del").style.display = existing ? "" : "none";
  setHlStatus("", "");
  const a = pending && pending.anchor;
  pop.style.left = Math.max(8, Math.min(window.innerWidth - 316, a ? a.x : window.innerWidth / 2)) + "px";
  pop.style.top = Math.max(8, Math.min(window.innerHeight - 230, a ? a.y + 8 : 120)) + "px";
  pop.classList.remove("hidden");
  pop.querySelector("#hl-body").focus();
}

async function saveHl() {
  if (!hlEditing) return;
  const { refId, pending, existing } = hlEditing;
  const tag = (document.getElementById("hl-tag").value || "").trim() || null;
  const body = document.getElementById("hl-body").value;
  setHlStatus("Saving…", "saving");
  try {
    if (existing) {
      await kbFetch(`kb_highlights?id=eq.${existing.id}`, { method: "PATCH", prefer: "return=minimal", body: { tag, body } });
      Object.assign(existing, { tag, body });
      if (pdfCtl) pdfCtl.render(existing);
    } else {
      const rows = await kbFetch("kb_highlights", { method: "POST", prefer: "return=representation",
        body: { ref_id: refId, tag, page: pending.page, rects: pending.rects, quote: pending.quote, body } });
      const saved = rows && rows[0];
      if (saved) { HLS.push(saved); if (pdfCtl) pdfCtl.render(saved); }
    }
    renderHlList();
    closeHlForm();
  } catch (e) { setHlStatus(e.message, "error"); }
}

async function deleteHl() {
  if (!hlEditing || !hlEditing.existing) return;
  const id = hlEditing.existing.id;
  try {
    await kbFetch(`kb_highlights?id=eq.${id}`, { method: "DELETE", prefer: "return=minimal" });
    HLS = HLS.filter(h => h.id !== id);
    if (pdfCtl) pdfCtl.remove(id);
    renderHlList();
    closeHlForm();
  } catch (e) { setHlStatus(e.message, "error"); }
}

// Route an edit to the right base table (curated -> kb_bib, archive -> kb_archive).
async function patchRef(r, patch) {
  const tbl = r.corpus === "archive" ? "kb_archive" : "kb_bib";
  const col = r.corpus === "archive" ? "arxiv_id" : "citation_key";
  await kbFetch(`${tbl}?${col}=eq.${encodeURIComponent(r.ref_id)}`,
    { method: "PATCH", prefer: "return=minimal", body: patch });
  Object.assign(r, patch);
}
async function savePriority(key) {
  const r = refByKey(key);
  const v = document.getElementById("rp-pri").value;
  const n = v === "" ? null : Math.max(0, Math.min(100, parseInt(v, 10) || 0));
  try { await patchRef(r, { reading_priority: n }); render(); }
  catch (e) { setRpStatus(e.message, "error"); }
}
async function setTags(key, next) {
  const r = refByKey(key);
  try { await patchRef(r, { tags: next }); renderReaderMeta(r); render(); }
  catch (e) { setRpStatus(e.message, "error"); }
}
function addTheme(key, tag) {
  tag = (tag || "").trim().replace(/^@+/, "").replace(/\s+/g, "_").toLowerCase();
  if (!tag) return;
  setTags(key, [...new Set([...tagsOf(refByKey(key)), tag])]);
}
function addObject(key, name) {
  name = (name || "").trim().replace(/^@+/, "");      // keep object casing (WASP-39b)
  if (!name) return;
  setTags(key, [...new Set([...tagsOf(refByKey(key)), "@" + name])]);
}
function removeTag(key, tag) {
  setTags(key, tagsOf(refByKey(key)).filter(t => t !== tag));
}

async function saveNote(key) {
  const ta = document.getElementById("rp-note");
  setRpStatus("Saving…", "saving");
  try {
    await kbFetch("xo_ref_notes", {
      method: "POST", prefer: "resolution=merge-duplicates,return=representation",
      body: { citation_key: key, body: ta.value }      // citation_key column holds the ref_id
    });
    NOTES[key] = ta.value;
    setRpStatus("Saved ✓", "saved");
    render();
  } catch (err) { setRpStatus(err.message, "error"); }
}

// Promote an archive paper into the curated bibliography (server-side, atomic).
async function promote(key) {
  const r = refByKey(key);
  if (!r || r.corpus !== "archive") return;
  setRpStatus("Promoting…", "saving");
  try {
    const res = await kbRpc("promote_to_curated", { p_arxiv_id: r.ref_id });
    const newKey = Array.isArray(res) ? res[0] : res;       // RPC returns the new citation key
    REFS = REFS.filter(x => x.ref_id !== r.ref_id);         // archive row is now hidden
    if (NOTES[r.ref_id] && !NOTES[newKey]) NOTES[newKey] = NOTES[r.ref_id];
    const rows = await kbFetch(`kb_library?corpus=eq.curated&ref_id=eq.${encodeURIComponent(newKey)}&select=${LIB_COLS}`);
    if (rows && rows[0]) REFS.push(rows[0]);                // surface it under Curated immediately
    setRpStatus(`Promoted → ${newKey} ✓`, "saved");
    closeReader();
    render();
  } catch (e) { setRpStatus(e.message, "error"); }
}

// Lazily pull the ~2.1k archive rows the first time the user leaves the curated scope.
async function loadArchive() {
  if (archiveLoaded) return;
  const sel = document.getElementById("scope-f");
  const cnt = document.getElementById("count");
  if (sel) sel.disabled = true;
  if (cnt) cnt.textContent = "loading…";
  try {
    const rows = await kbFetchAll(`kb_library?corpus=eq.archive&select=${LIB_COLS}&order=ref_id`);
    REFS = REFS.concat(rows || []);
    archiveLoaded = true;
  } finally {
    if (sel) sel.disabled = false;
  }
}

// canonical object names for autocomplete (xo_* tables + already-used object tags)
async function loadObjects() {
  const names = new Set();
  REFS.forEach(r => tagsOf(r).filter(isObj).forEach(t => names.add(objName(t))));
  try {
    const [pl, st, sy] = await Promise.all([
      kbFetch("xo_planets?select=name"), kbFetch("xo_stars?select=name"), kbFetch("xo_systems?select=name")
    ]);
    [pl, st, sy].forEach(arr => (arr || []).forEach(x => x.name && names.add(x.name)));
  } catch (e) { /* fall back to existing object tags only */ }
  OBJECTS = [...names].sort();
}

(async function () {
  await window.kbAuth.requireOwner({ onReady: async (user) => {
    try {
      const [refs, notes] = await Promise.all([
        kbFetchAll(`kb_library?corpus=eq.curated&select=${LIB_COLS}&order=ref_id`),
        kbFetchAll("xo_ref_notes?select=citation_key,body&order=citation_key")
      ]);
      REFS = refs || [];
      (notes || []).forEach(n => { NOTES[n.citation_key] = n.body || ""; });
      await loadObjects();
      const chapters = [...new Set(REFS.map(r => r.chapter).filter(Boolean))].sort();
      const chapOpts = chapters.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("");
      const statusOpts = Object.entries(STATUS_LABEL).map(([k, v]) => `<option value="${k}">${k} — ${v}</option>`).join("");

      mount(renderHeader("bibliography.html", user) + `<main>
        <h2 class="section-title">Bibliography <span class="muted">(<span id="count">0</span> of <span id="total">0</span> · <span id="pdfcount">0</span> with PDF · <span id="notecount" class="notecount">0 with notes</span>)</span></h2>
        <div class="bib-toolbar">
          <select id="scope-f" title="Which corpus to browse">
            <option value="curated">Curated bibliography</option>
            <option value="archive">arXiv archive</option>
            <option value="">All papers</option>
          </select>
          <input class="search" id="search" type="search" placeholder="Search key, title, author, venue, tag…" autocomplete="off">
          <select id="status-f"><option value="">All statuses</option>${statusOpts}</select>
          <select id="chapter-f"><option value="">All chapters</option>${chapOpts}</select>
          <label class="toggle"><input type="checkbox" id="notes-only"> 📝 Has notes</label>
        </div>
        <div class="tagbar" id="tagbar"></div>
        <table class="bib" id="bib"></table>
      </main>` + renderFooter() + `
      <div id="reader-panel" class="reader-panel hidden">
        <div class="rp-head">
          <span class="rp-key"></span><span class="rp-title"></span>
          <span class="spacer"></span><button id="rp-close">✕ Close</button>
        </div>
        <div class="rp-body">
          <div class="rp-pdf"></div>
          <div class="rp-notes">
            <div class="rp-meta"></div>
            <div class="rp-links"></div>
            <div class="rp-promote-row" id="rp-promote-row" style="display:none">
              <button class="primary" id="rp-promote">⭐ Promote to curated</button>
              <span class="muted">adds this archive paper to your curated bibliography</span>
            </div>
            <div class="rp-field" id="rp-hl-field" style="display:none">
              <label class="rp-lbl">Highlights <span class="muted">— select text in the PDF to add a tagged note</span></label>
              <div id="rp-hl-list" class="hl-list"></div>
            </div>
            <div class="rp-field">
              <label class="rp-lbl">Reading priority (0–100)</label>
              <input type="number" id="rp-pri" min="0" max="100" step="1" class="rp-pri-input">
            </div>
            <div class="rp-field">
              <label class="rp-lbl">🪐 Target object (planet / star / system)</label>
              <div id="rp-objs" class="tag-edit"></div>
              <input id="rp-obj-input" list="rp-obj-list" placeholder="add object, press Enter" autocomplete="off">
              <datalist id="rp-obj-list"></datalist>
            </div>
            <div class="rp-field">
              <label class="rp-lbl">Tags</label>
              <div id="rp-tags" class="tag-edit"></div>
              <input id="rp-tag-input" list="rp-tag-list" placeholder="add a tag, press Enter" autocomplete="off">
              <datalist id="rp-tag-list"></datalist>
            </div>
            <label class="rp-lbl">Notes</label>
            <textarea id="rp-note" placeholder="Live notes — autosaves when you click away…"></textarea>
            <div class="rp-actions">
              <button class="primary" id="rp-save">Save note</button>
              <span class="note-status" id="rp-status"></span>
            </div>
          </div>
        </div>
      </div>`);
      wireSignOut();
      render();

      document.getElementById("scope-f").addEventListener("change", async e => {
        scopeF = e.target.value;
        tagFilter.clear();                       // tags differ across corpora
        if (scopeF !== "curated" && !archiveLoaded) await loadArchive();
        render();
      });
      document.getElementById("search").addEventListener("input", e => { filter = e.target.value; render(); });
      document.getElementById("status-f").addEventListener("change", e => { statusF = e.target.value; render(); });
      document.getElementById("chapter-f").addEventListener("change", e => { chapterF = e.target.value; render(); });
      document.getElementById("notes-only").addEventListener("change", e => { notesOnly = e.target.checked; render(); });

      document.getElementById("tagbar").addEventListener("click", e => {
        if (e.target.closest("#tag-clear")) { tagFilter.clear(); render(); return; }
        const chip = e.target.closest(".tagchip[data-tag]");
        if (chip) { const t = chip.dataset.tag; tagFilter.has(t) ? tagFilter.delete(t) : tagFilter.add(t); render(); }
      });

      document.getElementById("bib").addEventListener("click", e => {
        const th = e.target.closest("th[data-k]");
        if (th) { const k = th.dataset.k; if (k === sortKey) sortDir *= -1; else { sortKey = k; sortDir = (k === "reading_priority" ? -1 : 1); } render(); return; }
        const chip = e.target.closest(".tagchip[data-tag]");
        if (chip) { const t = chip.dataset.tag; tagFilter.has(t) ? tagFilter.delete(t) : tagFilter.add(t); render(); return; }
        if (e.target.closest("a")) return;
        const row = e.target.closest(".ref-row");
        if (row) openReader(row.dataset.key);
      });

      document.getElementById("rp-close").addEventListener("click", closeReader);
      document.getElementById("rp-save").addEventListener("click", () => openKey && saveNote(openKey));
      document.getElementById("rp-promote").addEventListener("click", () => openKey && promote(openKey));
      document.getElementById("rp-hl-list").addEventListener("click", e => {
        const it = e.target.closest(".hl-item"); if (!it) return;
        const hl = HLS.find(h => h.id === it.dataset.id);
        if (hl) { if (pdfCtl) pdfCtl.scrollTo(hl.page); const r = refByKey(openKey); openHlForm(r && r.ref_id, null, hl); }
      });
      document.getElementById("rp-note").addEventListener("blur", () => {
        if (openKey && document.getElementById("rp-note").value !== (NOTES[openKey] || "")) saveNote(openKey);
      });
      document.getElementById("rp-pri").addEventListener("change", () => openKey && savePriority(openKey));
      document.getElementById("rp-obj-input").addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); addObject(openKey, e.target.value); e.target.value = ""; }
      });
      document.getElementById("rp-tag-input").addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); addTheme(openKey, e.target.value); e.target.value = ""; }
      });
      document.getElementById("rp-objs").addEventListener("click", e => {
        const x = e.target.closest("[data-rmtag]"); if (x && openKey) removeTag(openKey, x.dataset.rmtag);
      });
      document.getElementById("rp-tags").addEventListener("click", e => {
        const x = e.target.closest("[data-rmtag]"); if (x && openKey) removeTag(openKey, x.dataset.rmtag);
      });
      document.addEventListener("keydown", e => { if (e.key === "Escape" && openKey) closeReader(); });
    } catch (err) {
      mount(renderHeader("bibliography.html", user) + `<main>${errorNotice(err)}</main>` + renderFooter());
      wireSignOut();
    }
  }});
})();
</script>
</body>
</html>
