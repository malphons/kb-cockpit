<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kb-cockpit — Showcase</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  /* ---- exoplanet showcase (page-scoped) ---- */
  .sc-wrap { display: grid; grid-template-columns: 300px minmax(0,1fr); height: calc(100vh - 53px); }
  .sc-side { border-right: 1px solid var(--line); background: var(--panel); overflow: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  .sc-filters { display: flex; flex-wrap: wrap; gap: 6px; }
  .sc-filters select { width: auto; min-width: 0; flex: 1 1 46%; padding: 6px 8px; font-size: 12.5px; }
  .sc-count { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .sc-list { overflow: auto; flex: 1; min-height: 120px; }
  .sc-item { display: block; padding: 5px 8px; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid transparent; color: var(--text); }
  .sc-item:hover { background: var(--panel-2); }
  .sc-item.active { background: var(--panel-2); border-left-color: var(--accent); }
  .sc-item .sub { color: var(--muted); font-size: 11.5px; margin-left: 6px; }

  .sc-stage { position: relative; background: radial-gradient(ellipse at 50% 40%, #0a1322 0%, #05070c 70%); overflow: hidden; }
  .sc-stage canvas { display: block; width: 100%; height: 100%; }
  .sc-hud { position: absolute; background: rgba(11,14,20,.74); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 12.5px; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); max-width: 290px; }
  .sc-hud h4 { margin: 0 0 6px; font-size: 10.5px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
  .sc-id    { top: 14px; left: 14px; }
  .sc-phys  { bottom: 14px; left: 14px; }
  .sc-det   { top: 14px; right: 14px; }
  .sc-conf  { bottom: 14px; right: 14px; max-width: 230px; }
  .sc-row { display: flex; justify-content: space-between; gap: 16px; padding: 2px 0; line-height: 1.45; }
  .sc-row .k { color: var(--muted); }
  .sc-row .v { font-variant-numeric: tabular-nums; text-align: right; }
  .sc-d { border-bottom: 1px dotted var(--accent-2); cursor: help; color: #cdbcff; }
  .sc-u { color: var(--muted); font-size: 11px; margin-left: 3px; }
  .sc-title { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; }
  .sc-title .nm { font-size: 20px; font-weight: 600; letter-spacing: .3px; }
  .sc-title .rg { font-size: 12px; color: var(--muted); }
  .sc-notebtn { pointer-events: auto; margin-top: 6px; font-size: 12px; padding: 4px 12px; border-radius: 999px; }
  .sc-row.has-anno .k::before { content: "•"; color: var(--accent-2); margin-right: 4px; }
  .sc-links { margin: 1px 0 4px; display: flex; flex-wrap: wrap; gap: 5px; }
  .sc-hud .an-tag-btn { background: transparent; border: 0; cursor: pointer; opacity: .4; font-size: 11px; padding: 0 2px; }
  .sc-hud .sc-row:hover .an-tag-btn { opacity: .9; }
  .sc-toggle { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(11,14,20,.74); border: 1px solid var(--line); border-radius: 999px; padding: 3px; }
  .sc-toggle button { border: 0; background: transparent; color: var(--muted); border-radius: 999px; padding: 5px 14px; font-size: 12.5px; }
  .sc-toggle button.active { background: var(--accent); color: #06131f; font-weight: 600; }
  .sc-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; }
  .sc-foot { position: absolute; bottom: 4px; left: 12px; font-size: 10.5px; color: var(--muted); opacity: .8; pointer-events: none; }

  @media (max-width: 960px) {
    .sc-wrap { grid-template-columns: 1fr; height: auto; }
    .sc-side { border-right: 0; border-bottom: 1px solid var(--line); max-height: 240px; }
    .sc-stage { height: 70vh; }
    .sc-hud { position: static; max-width: none; margin: 8px; display: inline-block; }
  }
</style>
</head>
<body>
<div id="app"><p class="spinner">Loading…</p></div>

<script src="config.js"></script>
<script src="assets/vendor/supabase.min.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/app.js"></script>

<script type="importmap">
{ "imports": { "three": "./assets/vendor/three.module.min.js" } }
</script>
<script type="module" src="assets/showcase.js"></script>
</body>
</html>
