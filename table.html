<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kb-cockpit — Table</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  .xt-wrap { max-width: 1280px; margin: 0 auto; padding: 18px 22px; }
  .xt-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 0 0 12px; }
  .xt-bar .search { max-width: 280px; }
  .xt-bar select { width: auto; min-width: 140px; }
  .xt-bar .xt-count { color: var(--muted); font-size: 12.5px; margin-left: auto; }
  table.xt { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  table.xt th, table.xt td { text-align: left; padding: 7px 9px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  table.xt th { color: var(--muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: .4px; cursor: pointer; user-select: none; position: sticky; top: 0; background: var(--panel); }
  table.xt th.sorted::after { content: " ▾"; }
  table.xt th.sorted.asc::after { content: " ▴"; }
  table.xt td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.xt tbody tr:hover { background: var(--panel); }
  table.xt .nm { font-weight: 600; }
  table.xt .derived { color: #cdbcff; }
  .xt-note { cursor: pointer; border: 1px solid var(--line); border-radius: 999px; padding: 1px 9px; font-size: 12px; color: var(--muted); }
  .xt-note.has { color: var(--accent-2); border-color: var(--accent-2); }
  .xt-cbadge { display: inline-block; border: 1px solid; border-radius: 999px; padding: 0 7px; font-size: 10.5px; }
  .xt-cat { color: var(--muted); font-size: 11.5px; }
  .xt-page { display: flex; gap: 10px; align-items: center; justify-content: center; margin: 14px 0; }
</style>
</head>
<body>
<div id="app"><p class="spinner">Loading…</p></div>

<script src="config.js"></script>
<script src="assets/vendor/supabase.min.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/app.js"></script>
<script type="module" src="assets/table.js"></script>
</body>
</html>
